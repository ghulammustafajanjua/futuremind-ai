<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-label="FutureMind AI">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Transparent background (no fill) -->

  <g transform="translate(80,60)">
    <rect x="0" y="0" width="280" height="280" rx="64" fill="#0A0F1C" fill-opacity="0.92" stroke="url(#g)" stroke-width="2.5"/>
    <circle cx="140" cy="140" r="70" fill="url(#g)" opacity="0.1"/>
    <g fill="none" stroke="url(#g)" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
      <path d="M85 80 V230" stroke-width="16"/>
      <path d="M85 80 H160" stroke-width="16"/>
      <path d="M85 145 H145" stroke-width="13"/>
      <path d="M145 230 V105 L175 155 L205 105 V230" stroke-width="13"/>
    </g>
    <circle cx="140" cy="140" r="7" fill="#00D4FF"/>
    <circle cx="140" cy="140" r="3" fill="#fff"/>
  </g>

  <text x="420" y="195" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" letter-spacing="-1.5" fill="url(#g2)">FutureMind AI</text>
  <text x="422" y="250" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="4" fill="#9AA8C7">EXPLORE · CREATE · EARN WITH AI</text>
</svg>
