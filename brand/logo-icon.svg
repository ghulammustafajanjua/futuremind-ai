<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="FutureMind AI monogram">
  <defs>
    <linearGradient id="fmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F7CFF"/>
      <stop offset="48%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="fmGradSoft" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#4F7CFF"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer frame -->
  <rect x="48" y="48" width="416" height="416" rx="96" fill="#0A0F1C" stroke="url(#fmGrad)" stroke-width="3" opacity="0.95"/>
  <rect x="64" y="64" width="384" height="384" rx="86" fill="none" stroke="url(#fmGrad)" stroke-width="1" opacity="0.35"/>

  <!-- Ambient glow orb -->
  <circle cx="256" cy="256" r="120" fill="url(#fmGrad)" opacity="0.12" filter="url(#softGlow)"/>

  <!-- Neural node constellation (minimal) -->
  <g opacity="0.55" stroke="url(#fmGradSoft)" stroke-width="1.5" fill="none">
    <line x1="168" y1="170" x2="210" y2="210"/>
    <line x1="344" y1="170" x2="302" y2="210"/>
    <line x1="168" y1="342" x2="210" y2="302"/>
    <line x1="344" y1="342" x2="302" y2="302"/>
  </g>
  <g fill="url(#fmGrad)">
    <circle cx="168" cy="170" r="4" opacity="0.8"/>
    <circle cx="344" cy="170" r="4" opacity="0.8"/>
    <circle cx="168" cy="342" r="4" opacity="0.8"/>
    <circle cx="344" cy="342" r="4" opacity="0.8"/>
  </g>

  <!-- Monogram FM — geometric luxury mark -->
  <g filter="url(#glow)" fill="none" stroke="url(#fmGrad)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer hex-inspired shield path suggesting mind/circuit -->
    <path d="M256 118
             L338 158
             L358 250
             L308 342
             L204 342
             L154 250
             L174 158 Z"
          stroke-width="10" opacity="0.35"/>

    <!-- F stem + arms -->
    <path d="M196 168 V344" stroke-width="22"/>
    <path d="M196 168 H292" stroke-width="22"/>
    <path d="M196 248 H268" stroke-width="18"/>

    <!-- M peaks integrated -->
    <path d="M268 344 V200 L308 268 L348 200 V344" stroke-width="18"/>
  </g>

  <!-- Center AI node -->
  <circle cx="256" cy="256" r="10" fill="url(#fmGradSoft)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="4" fill="#FFFFFF" opacity="0.9"/>
</svg>
